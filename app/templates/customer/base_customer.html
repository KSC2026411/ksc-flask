<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}KSC LOGISTICS - Customer{% endblock %}</title>

    <!-- IMPORTANT FOR MOBILE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body class="{% block body_class %}{% endblock %}">

<!-- =====================================
     DESKTOP TOP NAVIGATION
     (VISIBLE ONLY ON lg+)
===================================== -->
<div class="d-none d-lg-flex flex-wrap align-items-center justify-content-between p-3 shadow-sm top-action-bar bg-dark-blue fixed-top">

    <div class="d-flex flex-wrap gap-2">

        <a href="{{ url_for('main.schedule') }}"
           class="btn btn-primary btn-lg shadow-sm d-flex align-items-center gap-2">
            <i class="bi bi-calendar-plus fs-4"></i>
            Schedule Pickup
        </a>

        <a href="{{ url_for('main.track') }}"
           class="btn btn-success btn-lg shadow-sm d-flex align-items-center gap-2">
            <i class="bi bi-truck fs-4"></i>
            Track a Package
        </a>

        <a href="{{ url_for('main.my_packages') }}"
           class="btn btn-info btn-lg shadow-sm d-flex align-items-center gap-2">
            <i class="bi bi-box-seam fs-4"></i>
            View All Packages
        </a>

        <a href="{{ url_for('main.customer_analytics') }}"
           class="btn btn-secondary btn-lg shadow-sm d-flex align-items-center gap-2">
            <i class="bi bi-bar-chart fs-4"></i>
            Analytics
        </a>

    </div>

    <a href="{{ url_for('main.logout') }}"
       class="btn btn-danger btn-lg shadow-sm d-flex align-items-center gap-2">
        <i class="bi bi-box-arrow-right fs-4"></i>
        Logout
    </a>

</div>

<!-- DESKTOP SPACER -->
<div class="d-none d-lg-block" style="height: 95px;"></div>

<!-- =====================================
     MOBILE NAVBAR
     (VISIBLE ONLY BELOW lg)
===================================== -->
<nav class="navbar navbar-dark bg-dark d-lg-none px-3 sticky-top shadow-sm">

    <span class="navbar-brand mb-0 h1">
        KSC Logistics
    </span>

    <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mobileMenu"
            aria-controls="mobileMenu"
            aria-expanded="false"
            aria-label="Toggle navigation">

        <span class="navbar-toggler-icon"></span>

    </button>

</nav>

<!-- MOBILE COLLAPSE MENU -->
<div class="collapse bg-dark text-white d-lg-none shadow-sm" id="mobileMenu">

    <div class="p-3">

        <a class="d-block mb-2 p-2 text-white text-decoration-none rounded {% if request.endpoint == 'main.dashboard' %}bg-secondary{% endif %}"
           href="{{ url_for('main.dashboard') }}">
            <i class="bi bi-house-door me-2"></i>
            Dashboard
        </a>

        <a class="d-block mb-2 p-2 text-white text-decoration-none rounded {% if request.endpoint == 'main.schedule' %}bg-secondary{% endif %}"
           href="{{ url_for('main.schedule') }}">
            <i class="bi bi-calendar-plus me-2"></i>
            Schedule Pickup
        </a>

        <a class="d-block mb-2 p-2 text-white text-decoration-none rounded {% if request.endpoint == 'main.my_packages' %}bg-secondary{% endif %}"
           href="{{ url_for('main.my_packages') }}">
            <i class="bi bi-box-seam me-2"></i>
            My Packages
        </a>

        <a class="d-block mb-2 p-2 text-white text-decoration-none rounded {% if request.endpoint == 'main.track' %}bg-secondary{% endif %}"
           href="{{ url_for('main.track') }}">
            <i class="bi bi-truck me-2"></i>
            Track Package
        </a>

        <a class="d-block mb-3 p-2 text-white text-decoration-none rounded {% if request.endpoint == 'main.customer_analytics' %}bg-secondary{% endif %}"
           href="{{ url_for('main.customer_analytics') }}">
            <i class="bi bi-bar-chart me-2"></i>
            Analytics
        </a>

        <hr class="border-light">

        <a class="btn btn-danger w-100"
           href="{{ url_for('main.logout') }}">
            <i class="bi bi-box-arrow-right me-2"></i>
            Logout
        </a>

    </div>

</div>

<!-- =====================================
     MAIN CONTENT
===================================== -->
<div class="container-fluid min-vh-100 p-3 p-md-4">

    {% block customer_content %}
    {% endblock %}

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
