<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>
        {% block title %}
            KSC LOGISTICS - Customer
        {% endblock %}
    </title>

    <!-- Mobile Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom Styling -->
    <style>

        /* ==============================
           DARK BLUE TOP NAVIGATION
        ============================== */
        .top-action-bar {
            background-color: #0b1f3a;
            z-index: 1050;
        }

        /* Prevent button wrapping */
        .top-nav-buttons {
            flex-wrap: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .top-nav-buttons::-webkit-scrollbar {
            display: none;
        }

        /* Smooth button look */
        .top-action-bar .btn {
            white-space: nowrap;
            border-radius: 10px;
        }

    </style>

</head>

<body class="{% block body_class %}{% endblock %}">

<!-- =====================================
     DESKTOP TOP NAVIGATION
     Visible only on lg+
===================================== -->
<div class="d-none d-lg-flex align-items-center justify-content-between px-3 py-2 shadow-sm top-action-bar fixed-top">

    <!-- LEFT SIDE NAVIGATION -->
    <div class="d-flex align-items-center gap-2 top-nav-buttons">

        <!-- Schedule -->
        <a href="{{ url_for('main.schedule') }}"
           class="btn btn-primary btn-sm shadow-sm d-flex align-items-center gap-1 px-3 py-2">

            <i class="bi bi-calendar-plus"></i>
            <span>Schedule</span>

        </a>

        <!-- Track -->
        <a href="{{ url_for('main.track') }}"
           class="btn btn-success btn-sm shadow-sm d-flex align-items-center gap-1 px-3 py-2">

            <i class="bi bi-truck"></i>
            <span>Track</span>

        </a>

        <!-- Packages -->
        <a href="{{ url_for('main.my_packages') }}"
           class="btn btn-info btn-sm shadow-sm d-flex align-items-center gap-1 px-3 py-2">

            <i class="bi bi-box-seam"></i>
            <span>Packages</span>

        </a>

        <!-- Analytics -->
        <a href="{{ url_for('main.customer_analytics') }}"
           class="btn btn-secondary btn-sm shadow-sm d-flex align-items-center gap-1 px-3 py-2">

            <i class="bi bi-bar-chart"></i>
            <span>Analytics</span>

        </a>

    </div>

    <!-- RIGHT SIDE ACTIONS -->
    <div class="d-flex align-items-center gap-2">

        <!-- Refresh -->
        <button onclick="window.location.reload();"
                class="btn btn-warning btn-sm shadow-sm d-flex align-items-center gap-1 px-3 py-2">

            <i class="bi bi-arrow-clockwise"></i>
            <span>Refresh</span>

        </button>

        <!-- Logout -->
        <a href="{{ url_for('main.logout') }}"
           class="btn btn-danger btn-sm shadow-sm d-flex align-items-center gap-1 px-3 py-2">

            <i class="bi bi-box-arrow-right"></i>
            <span>Logout</span>

        </a>

    </div>

</div>

<!-- Spacer for fixed desktop navbar -->
<div class="d-none d-lg-block" style="height: 70px;"></div>

<!-- =====================================
     MOBILE NAVBAR
     Visible only below lg
===================================== -->
<nav class="navbar navbar-dark d-lg-none sticky-top shadow-sm px-3"
     style="background-color: #0b1f3a;">

    <span class="navbar-brand mb-0 h1">
        KSC Logistics
    </span>

    <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mobileMenu"
            aria-controls="mobileMenu"
            aria-expanded="false"
            aria-label="Toggle navigation">

        <span class="navbar-toggler-icon"></span>

    </button>

</nav>

<!-- =====================================
     MOBILE COLLAPSIBLE MENU
===================================== -->
<div class="collapse text-white d-lg-none shadow-sm"
     id="mobileMenu"
     style="background-color: #0b1f3a;">

    <div class="p-3">

        <!-- Dashboard -->
        <a class="d-block mb-2 p-2 text-white text-decoration-none rounded
           {% if request.endpoint == 'main.dashboard' %}bg-secondary{% endif %}"
           href="{{ url_for('main.dashboard') }}">

            <i class="bi bi-house-door me-2"></i>
            Dashboard

        </a>

        <!-- Schedule -->
        <a class="d-block mb-2 p-2 text-white text-decoration-none rounded
           {% if request.endpoint == 'main.schedule' %}bg-secondary{% endif %}"
           href="{{ url_for('main.schedule') }}">

            <i class="bi bi-calendar-plus me-2"></i>
            Schedule Pickup

        </a>

        <!-- Packages -->
        <a class="d-block mb-2 p-2 text-white text-decoration-none rounded
           {% if request.endpoint == 'main.my_packages' %}bg-secondary{% endif %}"
           href="{{ url_for('main.my_packages') }}">

            <i class="bi bi-box-seam me-2"></i>
            My Packages

        </a>

        <!-- Track -->
        <a class="d-block mb-2 p-2 text-white text-decoration-none rounded
           {% if request.endpoint == 'main.track' %}bg-secondary{% endif %}"
           href="{{ url_for('main.track') }}">

            <i class="bi bi-truck me-2"></i>
            Track Package

        </a>

        <!-- Analytics -->
        <a class="d-block mb-3 p-2 text-white text-decoration-none rounded
           {% if request.endpoint == 'main.customer_analytics' %}bg-secondary{% endif %}"
           href="{{ url_for('main.customer_analytics') }}">

            <i class="bi bi-bar-chart me-2"></i>
            Analytics

        </a>

        <hr class="border-light">

        <!-- Refresh -->
        <button onclick="window.location.reload();"
                class="btn btn-warning w-100 mb-3">

            <i class="bi bi-arrow-clockwise me-2"></i>
            Refresh

        </button>

        <!-- Logout -->
        <a class="btn btn-danger w-100"
           href="{{ url_for('main.logout') }}">

            <i class="bi bi-box-arrow-right me-2"></i>
            Logout

        </a>

    </div>

</div>

<!-- =====================================
     MAIN PAGE CONTENT
===================================== -->
<div class="container-fluid min-vh-100 p-3 p-md-4">

    {% block customer_content %}
    {% endblock %}

</div>

<!-- Bootstrap Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
