<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}KSC LOGISTICS - Customer{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body class="{% block body_class %}{% endblock %}">

<!-- =========================
     TOP NAVIGATION BAR (FULL WIDTH, LIGHT BLUE)
========================= -->
<div class="d-flex flex-wrap align-items-center justify-content-between mb-4 p-3 rounded shadow-sm top-action-bar">
    <div class="d-flex flex-wrap gap-2">
        <a href="{{ url_for('main.schedule') }}" class="btn btn-primary btn-lg shadow-sm d-flex align-items-center gap-2">
            <i class="bi bi-calendar-plus fs-4"></i>
            Schedule Pickup
        </a>
        <a href="{{ url_for('main.track') }}" class="btn btn-success btn-lg shadow-sm d-flex align-items-center gap-2">
            <i class="bi bi-truck fs-4"></i>
            Track a Package
        </a>
        <a href="{{ url_for('main.my_packages') }}" class="btn btn-info btn-lg shadow-sm d-flex align-items-center gap-2">
            <i class="bi bi-box-seam fs-4"></i>
            View All Packages
        </a>
    </div>
    <a href="{{ url_for('main.logout') }}" class="btn btn-danger btn-lg shadow-sm d-flex align-items-center gap-2">
        <i class="bi bi-box-arrow-right fs-4"></i>
        Logout
    </a>
</div>

<!-- =========================
     MOBILE NAVBAR (optional, small screens)
========================= -->
<nav class="navbar navbar-dark bg-dark d-lg-none px-3 mb-3">
    <span class="navbar-brand">Customer Panel</span>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mobileMenu">
        <span class="navbar-toggler-icon"></span>
    </button>
</nav>

<div class="collapse bg-dark text-white p-3 d-lg-none mb-3" id="mobileMenu">
    <a class="d-block mb-2 p-2 {% if request.endpoint == 'main.dashboard' %}bg-secondary rounded{% endif %}" 
       href="{{ url_for('main.dashboard') }}">Dashboard</a>
    <a class="d-block mb-2 p-2 {% if request.endpoint == 'main.schedule' %}bg-secondary rounded{% endif %}" 
       href="{{ url_for('main.schedule') }}">Schedule Pickup</a>
    <a class="d-block mb-2 p-2 {% if request.endpoint == 'main.my_packages' %}bg-secondary rounded{% endif %}" 
       href="{{ url_for('main.my_packages') }}">My Packages</a>
    <a class="d-block mb-2 p-2 {% if request.endpoint == 'main.track' %}bg-secondary rounded{% endif %}" 
       href="{{ url_for('main.track') }}">Track Package</a>
    <hr>
    <a class="btn btn-danger w-100" href="{{ url_for('main.logout') }}">Logout</a>
</div>

<!-- =========================
     MAIN CONTENT AREA
========================= -->
<div class="container-fluid min-vh-100 p-3 p-md-4">
    {% block customer_content %}
    {% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
