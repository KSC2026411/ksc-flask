<table class="table table-striped">
    <thead>
        <tr>
            <th>Tracking</th>
            <th>Description</th>
            <th>User</th>
            <th>Pickup Date</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for p in packages %}
        <tr>
            <td>{{ p.tracking_number }}</td>
            <td>{{ p.description }}</td>
            <td>{{ p.user.name }}</td>
            <td>{{ p.pickup_date.strftime('%Y-%m-%d') }}</td>
            <td>{{ p.status }}</td>
            <td>
                <a href="{{ url_for('admin_update_package', id=p.id) }}" class="btn btn-sm btn-outline-primary">Update</a>
            </td>
        </tr>
        {% else %}
        <tr>
            <td colspan="6" class="text-center">No packages found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
