<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Offline - KSC Logistics</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0F172A;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .box {
            max-width: 420px;
            padding: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 10px;
        }

        p {
            opacity: 0.8;
            margin: 6px 0;
        }

        .btn {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 18px;
            background: #38BDF8;
            color: #0F172A;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }

        .btn:hover {
            background: #0ea5e9;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="icon">📦</div>

        <h1>You’re offline</h1>

        <p>KSC Logistics cannot connect to the internet right now.</p>
        <p>Please check your connection and try again.</p>

        <button class="btn" onclick="window.location.reload()">
            Retry
        </button>
    </div>
</body>
</html>
