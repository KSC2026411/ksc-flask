<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}KSC LOGISTICS{% endblock %}</title>

    <!-- ✅ Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ✅ YOUR CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        /* Make navbar buttons larger and spaced */
        .navbar .nav-links .btn {
            font-size: 1.1rem;
            padding: 10px 18px;
            margin-left: 8px;
            border-radius: 8px;
        }

        /* Stack buttons vertically on small screens */
        @media (max-width: 768px) {
            .navbar .nav-links {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .navbar .nav-links .btn {
                margin-left: 0;
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>

<body class="{% block body_class %}{% endblock %}">

<!-- NAVBAR -->
<nav class="navbar">
    <div class="container">
        <a href="{{ url_for('home') }}" class="navbar-brand">KSC LOGISTICS</a>

        <div class="nav-links">
            {% if current_user.is_authenticated %}
                {% if current_user.is_admin %}
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-light btn-lg">Dashboard</a>
                    <a href="{{ url_for('admin_users') }}" class="btn btn-outline-light btn-lg">Manage Users</a>
                    <a href="{{ url_for('admin_announcements') }}" class="btn btn-outline-light btn-lg">Announcements</a>
                {% else %}
                    <a href="{{ url_for('my_packages') }}" class="btn btn-outline-light btn-lg">My Packages</a>
                    <a href="{{ url_for('schedule') }}" class="btn btn-outline-light btn-lg">Schedule Pickup</a>
                {% endif %}
                <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-lg">Logout</a>
            {% else %}
                <a href="{{ url_for('login') }}" class="btn btn-outline-light btn-lg">Login</a>
                <a href="{{ url_for('register') }}" class="btn btn-primary btn-lg">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="page-content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
