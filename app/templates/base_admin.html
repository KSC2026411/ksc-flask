{% extends "base_public.html" %}

{% block content %}

{% if current_user.is_authenticated and current_user.role == "admin" %}

<!-- ADMIN NAVBAR (LIGHT BLUE) -->
<nav class="navbar navbar-expand-lg shadow-sm"
     style="background-color: #87CEEB;">

    <div class="container-fluid">

        <!-- BRAND -->
        <span class="navbar-brand fw-bold text-dark">
            KSC LOGISTICS ADMIN
        </span>

        <!-- MOBILE TOGGLE -->
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#adminNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- NAV LINKS -->
        <div class="collapse navbar-collapse justify-content-end" id="adminNav">

            <div class="d-flex flex-wrap gap-2 mt-2 mt-lg-0">

                <a href="{{ url_for('main.admin_dashboard') }}"
                   class="btn btn-outline-dark btn-sm">
                    Dashboard
                </a>

                <a href="{{ url_for('main.admin_users') }}"
                   class="btn btn-outline-dark btn-sm">
                    Users
                </a>

                <a href="{{ url_for('main.admin_packages') }}"
                   class="btn btn-outline-dark btn-sm">
                    Packages
                </a>

                <a href="{{ url_for('main.admin_archived_packages') }}"
                   class="btn btn-outline-dark btn-sm">
                    Archived
                </a>

                <a href="{{ url_for('main.admin_announcements') }}"
                   class="btn btn-outline-dark btn-sm">
                    Announcements
                </a>

                <a href="{{ url_for('main.logout') }}"
                   class="btn btn-danger btn-sm">
                    Logout
                </a>

            </div>

        </div>

    </div>

</nav>

<!-- ADMIN CONTENT AREA -->
<div class="container-fluid py-4">

    {% block admin_content %}{% endblock %}

</div>

{% else %}

<div class="container mt-5">
    <div class="alert alert-danger">
        Unauthorized access.
    </div>
</div>

{% endif %}

{% endblock %}
